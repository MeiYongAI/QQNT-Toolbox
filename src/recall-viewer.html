<!doctype html>
<html lang="zh-CN">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>撤回消息查看</title>
    <style>
        :root {
            color-scheme: light dark;
            --scrollbar-thumb: #0000001a;
            --sidebar-active-bg: #0099ff;
            --sidebar-active-text: #fff;
            --sidebar-bg: #fff;
            --sidebar-text: #111;
            --message-bg: #fff;
            --message-text: #111;
            --image-bg: #f2f2f2;
            --content-bg: #f2f2f2;
            --sidebar-hover: rgba(0, 153, 255, .1);
            --tag-bg: #90a4ae;
            --tag-text: #fff;
            --empty-text: #777;
            --secondary-text: #73777f;
            --subtle-bg: #f2f3f5;
            --border-color: rgba(0, 0, 0, .09);
            --accent: #0099ff;
        }
        @media (prefers-color-scheme: dark) {
            :root {
                --scrollbar-thumb: #ffffff3d;
                --sidebar-active-bg: #0d6ecf;
                --sidebar-active-text: #ffffffe6;
                --sidebar-bg: #1b1b1b;
                --sidebar-text: #ffffffe6;
                --message-bg: #262626;
                --message-text: #ffffffe6;
                --image-bg: #111;
                --content-bg: #111;
                --sidebar-hover: rgba(0, 153, 255, .3);
                --tag-bg: #67767e;
                --tag-text: #ffffffa1;
                --empty-text: #ffffff8c;
                --secondary-text: #ffffff8c;
                --subtle-bg: #1d1d1d;
                --border-color: rgba(255, 255, 255, .1);
                --accent: #5baeff;
            }
        }
        * {
            box-sizing: border-box;
            letter-spacing: 0;
        }
        *::-webkit-scrollbar {
            width: 8px;
            height: 8px;
        }
        *::-webkit-scrollbar-thumb {
            border-radius: 10px;
            background: transparent;
        }
        *:hover::-webkit-scrollbar-thumb {
            background: var(--scrollbar-thumb);
        }
        html,
        body {
            width: 100%;
            height: 100%;
            margin: 0;
            overflow: hidden;
        }
        body {
            color: var(--message-text);
            background: var(--content-bg);
            font: 14px/1.45 Arial, "Microsoft YaHei UI", "Microsoft YaHei", sans-serif;
            user-select: none;
        }
        .data {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: stretch;
        }
        .sidebar {
            flex: 0 0 clamp(250px, 30%, 350px);
            width: clamp(250px, 30%, 350px);
            height: 100%;
            padding: 10px 6px;
            overflow: auto;
            background: var(--sidebar-bg);
            color: var(--sidebar-text);
        }
        .chat-item {
            display: flex;
            width: 100%;
            min-height: 32px;
            margin: 0;
            padding: 6px 8px;
            align-items: center;
            justify-content: flex-start;
            gap: 8px;
            border: 0;
            border-radius: 4px;
            color: inherit;
            background: transparent;
            font: inherit;
            text-align: left;
            cursor: pointer;
            transition: background-color .15s ease, color .15s ease;
        }
        .chat-item:hover {
            background: var(--sidebar-hover);
        }
        .chat-item.active {
            color: var(--sidebar-active-text);
            background: var(--sidebar-active-bg);
        }
        .chat-tag {
            flex: 0 0 16px;
            width: 16px;
            height: 16px;
            border-radius: 4px;
            color: var(--tag-text);
            background: var(--tag-bg);
            font-size: 10px;
            line-height: 16px;
            text-align: center;
        }
        .chat-avatar,
        .message-avatar {
            position: relative;
            display: inline-flex;
            flex: 0 0 auto;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            color: var(--secondary-text);
            background: var(--subtle-bg);
            font-weight: 600;
            user-select: none;
        }
        .chat-avatar {
            width: 34px;
            height: 34px;
            border-radius: 6px;
            font-size: 13px;
        }
        .message-avatar {
            width: 36px;
            height: 36px;
            margin-top: 18px;
            border-radius: 6px;
            font-size: 13px;
        }
        .chat-avatar img,
        .message-avatar img {
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .chat-copy {
            display: flex;
            flex: 1 1 auto;
            min-width: 0;
            flex-direction: column;
            line-height: 18px;
        }
        .chat-name {
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }
        .chat-uin {
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            opacity: .7;
            font-size: 11px;
        }
        .messages {
            flex: 1 1 auto;
            min-width: 0;
            height: 100%;
            padding: 20px 10px;
            overflow: auto;
            background: var(--content-bg);
        }
        .empty-state {
            display: flex;
            width: 100%;
            height: 100%;
            align-items: center;
            justify-content: center;
            color: var(--empty-text);
            font-size: 14px;
        }
        .message-item {
            display: flex;
            margin-bottom: 12px;
            align-items: flex-start;
            gap: 10px;
        }
        .message-box {
            display: flex;
            width: fit-content;
            min-width: 0;
            max-width: min(620px, calc(100% - 46px));
            flex-direction: column;
            align-items: flex-start;
        }
        .sender {
            max-width: 100%;
            margin: 0;
            padding-left: 8px;
            color: var(--message-text);
            font-size: 12px;
            overflow-wrap: anywhere;
            user-select: text;
        }
        .message-time {
            display: block;
            margin-top: 2px;
            padding-left: 8px;
            color: var(--secondary-text);
            font-size: 11px;
            line-height: 14px;
            white-space: nowrap;
            user-select: text;
        }
        .message-content {
            display: inline-block;
            width: fit-content;
            min-width: 0;
            max-width: 100%;
            min-height: 34px;
            margin-top: 4px;
            padding: 8px 10px;
            border-radius: 8px;
            color: var(--message-text);
            background: var(--message-bg);
            cursor: default;
            outline: none;
            user-select: text;
        }
        .message-content:focus-visible {
            box-shadow: 0 0 0 2px var(--sidebar-active-bg);
        }
        .image-list {
            display: grid;
            max-width: 100%;
            grid-template-columns: repeat(2, 132px);
            gap: 4px;
        }
        .image-item {
            position: relative;
            flex: 0 0 auto;
            width: 180px;
            max-width: 100%;
            padding: 0;
            aspect-ratio: 4 / 3;
            overflow: hidden;
            border: 0;
            border-radius: 6px;
            background: var(--image-bg);
            cursor: zoom-in;
            outline: none;
            user-select: none;
        }
        .image-item:focus-visible {
            box-shadow: 0 0 0 2px var(--sidebar-active-bg);
        }
        .image-item.is-grid {
            width: 132px;
            aspect-ratio: 1;
        }
        .image-item img {
            display: block;
            position: absolute;
            inset: 0;
            width: 100%;
            height: 100%;
            object-fit: contain;
        }
        .image-preview-layer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            padding: 32px;
            align-items: center;
            justify-content: center;
            background: rgba(0, 0, 0, .72);
            user-select: none;
        }
        .image-preview {
            display: block;
            max-width: 100%;
            max-height: 100%;
            object-fit: contain;
        }
        .image-preview-close {
            position: absolute;
            top: 12px;
            right: 12px;
            width: 34px;
            height: 34px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            color: #fff;
            background: rgba(0, 0, 0, .45);
            font: 24px/1 Arial, sans-serif;
            cursor: pointer;
        }
        .image-preview-close:hover,
        .image-preview-close:focus-visible {
            background: rgba(0, 0, 0, .68);
            outline: 2px solid rgba(255, 255, 255, .82);
            outline-offset: 1px;
        }
        .message-text {
            max-width: 560px;
            min-height: 18px;
            margin: 0;
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            cursor: text;
        }
        .message-mention {
            color: var(--accent);
        }
        .message-parts {
            display: flex;
            width: fit-content;
            min-width: 0;
            max-width: 100%;
            flex-direction: column;
            gap: 6px;
        }
        .reply-preview {
            max-width: 100%;
            padding: 4px 8px;
            border-left: 3px solid var(--secondary-text);
            color: var(--secondary-text);
            background: var(--subtle-bg);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .voice-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }
        .voice-player {
            display: flex;
            width: min(250px, 100%);
            max-width: 100%;
            min-width: 150px;
            height: 36px;
            align-items: center;
            gap: 8px;
        }
        .voice-toggle {
            position: relative;
            flex: 0 0 28px;
            width: 28px;
            height: 28px;
            padding: 0;
            border: 0;
            border-radius: 50%;
            color: var(--message-text);
            background: var(--subtle-bg);
            cursor: pointer;
        }
        .voice-toggle-icon::before {
            content: "";
            position: absolute;
            top: 8px;
            left: 11px;
            width: 0;
            height: 0;
            border-top: 6px solid transparent;
            border-bottom: 6px solid transparent;
            border-left: 9px solid currentColor;
        }
        .voice-toggle-icon::after {
            content: "";
            display: none;
        }
        .voice-player.playing .voice-toggle-icon::before,
        .voice-player.playing .voice-toggle-icon::after {
            display: block;
            position: absolute;
            top: 8px;
            width: 2px;
            height: 12px;
            border: 0;
            border-radius: 1px;
            background: currentColor;
        }
        .voice-player.playing .voice-toggle-icon::before {
            left: 10px;
        }
        .voice-player.playing .voice-toggle-icon::after {
            right: 10px;
        }
        .voice-player.loading {
            opacity: .6;
            pointer-events: none;
        }
        .voice-waveform {
            display: flex;
            flex: 1 1 auto;
            height: 18px;
            align-items: center;
            gap: 2px;
            overflow: hidden;
        }
        .voice-wave {
            display: block;
            flex: 1 1 2px;
            min-width: 2px;
            max-width: 3px;
            border-radius: 2px;
            background: var(--secondary-text);
            transition: background-color .12s ease;
        }
        .voice-wave.played {
            background: var(--accent);
        }
        .voice-duration {
            flex: 0 0 auto;
            color: var(--secondary-text);
            font-size: 11px;
            white-space: nowrap;
        }
        .voice-player audio {
            display: none;
        }
        .voice-transcript {
            padding-top: 6px;
            border-top: 1px solid var(--border-color);
            color: var(--secondary-text);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            user-select: text;
        }
        .media-card {
            display: flex;
            width: 360px;
            max-width: 100%;
            min-height: 52px;
            padding: 8px;
            align-items: center;
            gap: 9px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: var(--subtle-bg);
        }
        .media-kind {
            display: inline-flex;
            flex: 0 0 34px;
            width: 34px;
            height: 34px;
            align-items: center;
            justify-content: center;
            border-radius: 5px;
            color: var(--secondary-text);
            background: var(--message-bg);
            font-size: 11px;
        }
        .media-card-image {
            width: 54px;
            height: 54px;
            border-radius: 4px;
            object-fit: cover;
            background: var(--image-bg);
        }
        .media-copy {
            flex: 1 1 auto;
            min-width: 0;
        }
        .media-title {
            white-space: pre-wrap;
            overflow-wrap: anywhere;
        }
        .media-meta {
            margin-top: 2px;
            color: var(--secondary-text);
            font-size: 11px;
            white-space: pre-wrap;
        }
        .video-part {
            display: block;
            width: 420px;
            max-width: 100%;
            max-height: 320px;
            border-radius: 6px;
            background: #000;
        }
        .face-part,
        .unsupported-part,
        .notice-part {
            color: var(--secondary-text);
            white-space: pre-wrap;
            overflow-wrap: anywhere;
            user-select: text;
        }
        .toast {
            position: fixed;
            left: 50%;
            bottom: 24px;
            z-index: 5;
            max-width: min(420px, calc(100% - 32px));
            padding: 7px 12px;
            border-radius: 6px;
            color: #fff;
            background: rgba(32, 32, 32, .9);
            transform: translateX(-50%);
            pointer-events: none;
        }
        @media (max-width: 700px) {
            .sidebar {
                flex-basis: 250px;
                width: 250px;
            }
            .image-list {
                grid-template-columns: repeat(2, 108px);
            }
            .image-item.is-grid {
                width: 108px;
            }
        }
    </style>
</head>
<body>
    <div class="data">
        <aside id="chat-list" class="sidebar"><div class="empty-state">加载数据中...</div></aside>
        <main id="message-list" class="messages"><div class="empty-state">请选择左侧会话</div></main>
    </div>
    <script src="./recall-viewer.js"></script>
</body>
</html>
